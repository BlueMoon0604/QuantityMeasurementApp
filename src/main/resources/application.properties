spring.application.name=quantity-measurement-app

# =========================
# MYSQL DATABASE
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/quantitydb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



# =========================
# GOOGLE OAUTH2
# =========================
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# =========================
# JWT
# =========================
app.jwt.secret=ThisIsASecretKeyForJwtAuthentication123456
app.jwt.expiration=86400000
# Load secrets from external file
spring.config.import=classpath:application-secrets.properties